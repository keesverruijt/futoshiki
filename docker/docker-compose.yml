version: '3.8'

# Futoshiki Helper Docker Compose
#
# This setup provides a PHP-FPM backend for the API and MySQL database.
# The static files and nginx configuration should be handled by your
# existing webserver at verruijt.net.
#
# Usage:
#   1. Copy .env.example to .env and set your passwords
#   2. Run: docker-compose up -d
#   3. Configure your nginx to include nginx.conf
#   4. Copy the static files to /var/www/futoshiki/

services:
  # PHP-FPM service for API endpoints
  futoshiki-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futoshiki-app
    restart: unless-stopped
    volumes:
      - ../api:/var/www/api:ro
    environment:
      - DB_HOST=futoshiki-db
      - DB_NAME=futoshiki
      - DB_USER=futoshiki
      - DB_PASS=${MYSQL_PASSWORD:-changeme}
    depends_on:
      futoshiki-db:
        condition: service_healthy
    networks:
      - futoshiki-net
      - webproxy  # Connect to your existing nginx network

  # MySQL database
  futoshiki-db:
    image: mysql:8.0-oracle
    container_name: futoshiki-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme_root}
      - MYSQL_DATABASE=futoshiki
      - MYSQL_USER=futoshiki
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
    volumes:
      - futoshiki-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futoshiki-net

volumes:
  futoshiki-data:

networks:
  futoshiki-net:
    driver: bridge
  webproxy:
    external: true  # Your existing nginx proxy network

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futoshiki Helper</title>
    <link rel="stylesheet" href="styles.css">
    <!-- No Firebase scripts needed - using local MySQL backend -->
    <script>
        // Configure for local API
        const FUTOSHIKI_USE_LOCAL_API = true;
        const FUTOSHIKI_API_URL = '/futoshiki/api';
    </script>
</head>
<body>
    <div class="container">
        <h1>Kees's Futoshiki Helper <span class="version">v3.9</span></h1>

        <div id="setup" class="setup">
            <label for="size-select">Grid Size:</label>
            <select id="size-select">
                <option value="4">4×4</option>
                <option value="5" selected>5×5</option>
                <option value="6">6×6</option>
                <option value="7">7×7</option>
                <option value="8">8×8</option>
                <option value="9">9×9</option>
            </select>
            <button id="start-btn">Enter Puzzle</button>
            <div class="generate-buttons">
                <button id="generate-easy-btn" class="generate-btn">Easy</button>
                <button id="generate-medium-btn" class="generate-btn">Medium</button>
                <button id="generate-hard-btn" class="generate-btn">Hard</button>
            </div>
        </div>

        <div id="entry-controls" class="controls hidden">
            <button id="entry-done-btn">Start Solving</button>
            <button id="share-btn">Share Puzzle</button>
            <button id="entry-cancel-btn">Cancel</button>
        </div>

        <div id="controls" class="controls hidden">
            <button id="new-game-btn">New Game</button>
            <button id="auto-digits-btn">Auto Digits: OFF</button>
            <button id="hint-btn">Hint</button>
        </div>

        <div id="generation-progress" class="generation-progress hidden">
            <div class="progress-content">
                <div class="progress-title">Generating puzzle...</div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="progress-stats">
                    <span id="progress-attempts">0</span> puzzles found
                    <span class="progress-separator">|</span>
                    <span id="progress-time">0</span>s elapsed
                </div>
                <div id="progress-best" class="progress-best hidden">
                    Best: <span id="progress-best-hints">0</span> hints
                </div>
                <div class="progress-buttons">
                    <button type="button" id="use-best-btn" class="use-best-btn hidden">Use Best</button>
                    <button type="button" id="cancel-generation-btn" class="cancel-btn">Cancel</button>
                </div>
            </div>
        </div>

        <div id="game-container" class="game-container hidden">
            <div id="grid" class="grid"></div>
            <div id="number-pad" class="number-pad"></div>
            <div id="input-row" class="input-row hidden">
                <button type="button" id="candidate-mode-btn" class="input-btn mode-btn" title="Toggle candidate mode">
                    <span class="mode-icon">
                        <span>1 2 3</span>
                        <span>4 5 6</span>
                        <span>7 8 9</span>
                    </span>
                </button>
                <div id="number-buttons" class="number-buttons">
                    <!-- Numbers will be generated by JS based on grid size -->
                </div>
                <button type="button" id="eraser-btn" class="input-btn eraser-btn" title="Erase">✕</button>
                <button type="button" id="undo-btn" class="input-btn undo-btn" title="Undo" disabled>↺</button>
            </div>
        </div>

        <div id="game-counters" class="game-counters hidden">
            <div class="counter-row">
                <span class="counter-label">Time:</span>
                <span id="current-time" class="counter-value">0:00</span>
            </div>
            <div class="counter-row">
                <span class="counter-label">Your avg (<span id="size-label">5x5</span>):</span>
                <span id="local-avg-time" class="counter-value">--:--</span>
                <span class="counter-detail">(<span id="local-completed">0</span> solved)</span>
            </div>
            <div class="counter-row">
                <span class="counter-label">Global avg:</span>
                <span id="global-avg-time" class="counter-value">--:--</span>
            </div>
        </div>

        <div id="solvability-status" class="solvability-status hidden"></div>
    </div>

    <script src="app.js"></script>
    <script src="generator-worker.js"></script>
</body>
</html>

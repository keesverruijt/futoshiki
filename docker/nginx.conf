# Nginx configuration for Futoshiki Helper
# Include this in your server block for verruijt.net
#
# Example:
#   server {
#       listen 443 ssl http2;
#       server_name verruijt.net;
#       ...
#       include /path/to/futoshiki/docker/nginx.conf;
#   }

location /futoshiki {
    return 301 /futoshiki/;
}

location /futoshiki/ {
    alias /var/www/futoshiki/;
    index index.html;
    try_files $uri $uri/ /futoshiki/index.html;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|gif|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # PHP API endpoints - proxy to PHP-FPM container
    location ~ ^/futoshiki/api/(.*)\.php$ {
        # Rewrite to remove /futoshiki prefix for PHP-FPM
        fastcgi_pass futoshiki-app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/api/$1.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;

        # Security headers for API
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Access-Control-Allow-Origin "https://verruijt.net" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://verruijt.net";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
}
